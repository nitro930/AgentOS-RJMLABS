  <rect width="64" height="64" rx="14" fill="#0f1117"/>
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#bg)" opacity="0.15"/>
  <rect x="6" y="6" width="52" height="52" rx="10" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <text x="32" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#10b981" text-anchor="middle" letter-spacing="-1">RJ</text>
  <text x="32" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#6b7280" text-anchor="middle" letter-spacing="2">LABS</text>
  <circle cx="32" cy="52" r="2" fill="#10b981" opacity="0.8">
